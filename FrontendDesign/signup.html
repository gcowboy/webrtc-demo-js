<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Voice – Sign up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-card">
        <h1>Sign up</h1>
        <p>Create your Google Voice mock account.</p>
        <label>Full name<input type="text" placeholder="Alex Johnson" /></label>
        <label>Email<input type="email" placeholder="you@example.com" /></label>
        <label>Password<input type="password" placeholder="Create password" /></label>
        <button class="send-btn" type="button">Create account</button>
        <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
        <p class="auth-footer"><a href="index.html">Back to Messages</a></p>
      </section>
    </main>
  </body>
</html>
