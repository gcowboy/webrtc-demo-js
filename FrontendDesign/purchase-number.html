<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Voice – Purchase Number</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="settings-layout">
      <header class="settings-header">
        <h1>Purchase Phone Number</h1>
        <a class="panel-link" href="settings.html">Back to Settings</a>
      </header>

      <section class="settings-card">
        <h2>Search available numbers</h2>
        <div class="setting-row">
          <span>Area code</span>
          <strong>415</strong>
        </div>
        <div class="available-list">
          <article class="available-item">
            <div>
              <h3>+1 (415) 555-0196</h3>
              <p>San Francisco, CA • Local</p>
            </div>
            <button class="send-btn" type="button">Purchase</button>
          </article>
          <article class="available-item">
            <div>
              <h3>+1 (415) 555-0184</h3>
              <p>San Francisco, CA • Local</p>
            </div>
            <button class="send-btn" type="button">Purchase</button>
          </article>
          <article class="available-item">
            <div>
              <h3>+1 (415) 555-0131</h3>
              <p>San Francisco, CA • Local</p>
            </div>
            <button class="send-btn" type="button">Purchase</button>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
