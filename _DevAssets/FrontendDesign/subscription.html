<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Voice – Subscription</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="settings-layout">
      <header class="settings-header">
        <h1>Subscription</h1>
        <a class="panel-link" href="index.html">Back to Messages</a>
      </header>
      <section class="settings-card">
        <h2>Current Plan</h2>
        <p class="auth-footer">Google Voice Starter</p>
        <div class="setting-row"><span>Price</span><strong>$10/month</strong></div>
        <div class="setting-row"><span>Included users</span><strong>1</strong></div>
        <div class="setting-row"><span>Minutes usage</span><strong>124 / 500</strong></div>
        <button class="send-btn" type="button">Upgrade Plan</button>
      </section>
    </main>
  </body>
</html>
